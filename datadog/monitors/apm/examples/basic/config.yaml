meta:
  environment: production
  name: api-latency
  team: backend
  cost_center: eng-001

monitor:
  type: metric alert
  query: "avg(last_5m):avg:trace.http.request.duration{service:api,env:production} > 1"
  message: |
    {{#is_alert}}
    API latency is above 1 second
    {{/is_alert}}
    
    {{#is_warning}}
    API latency is elevated
    {{/is_warning}}
    
    @slack-backend-alerts @pagerduty-backend
  
  thresholds:
    critical: 1.0
    warning: 0.5
    critical_recovery: 0.8
  
  evaluation_delay: 60
  notify_no_data: true
  no_data_timeframe: 10
  renotify_interval: 30

tags:
  - service:api
  - severity:high
  - monitor_type:apm
