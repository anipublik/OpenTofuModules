meta:
  environment: production
  name: api-health-check
  team: backend
  cost_center: eng-002

test:
  subtype: http
  status: live
  message: "API health check failed @slack-backend-alerts"
  locations:
    - aws:us-east-1
    - aws:eu-west-1
    - aws:ap-southeast-1
  
  request:
    method: GET
    url: "https://api.example.com/health"
    headers:
      Content-Type: application/json
  
  assertions:
    status_code: 200
    response_time: 500
    body_contains:
      - "healthy"
      - "ok"
  
  options:
    tick_every: 300
    follow_redirects: true
    min_failure_duration: 0
    min_location_failed: 1
    retry_count: 2
    retry_interval: 300

tags:
  - service:api
  - test_type:health_check
