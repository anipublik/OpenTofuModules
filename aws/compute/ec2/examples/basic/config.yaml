meta:
  environment: production
  region: us-east-1
  name: web-server
  team: platform
  cost_center: eng-001

instance:
  ami: ami-0c55b159cbfafe1f0
  instance_type: t3.medium
  key_name: my-key-pair
  
  root_volume_size: 30
  root_volume_type: gp3
  
  detailed_monitoring: true
  
  user_data: |
    #!/bin/bash
    yum update -y
    yum install -y httpd
    systemctl start httpd
    systemctl enable httpd

autoscaling:
  min_size: 2
  max_size: 10
  desired_size: 3
  target_cpu_utilization: 70
  health_check_type: ELB
  health_check_grace_period: 300

networking:
  vpc_id: vpc-12345678
  subnet_ids:
    - subnet-11111111
    - subnet-22222222
  ingress_rules:
    - from_port: 80
      to_port: 80
      protocol: tcp
      cidr_blocks:
        - 0.0.0.0/0
      description: Allow HTTP

security:
  encryption_enabled: true
  public_access: false
  deletion_protection: false
  audit_logging: true

tags:
  application: web
