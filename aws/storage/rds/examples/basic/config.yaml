meta:
  environment: production
  region: us-east-1
  name: app-db
  team: platform
  cost_center: eng-001

database:
  engine: postgres
  engine_version: "15.4"
  instance_class: db.t3.medium
  allocated_storage: 100
  max_allocated_storage: 500
  storage_type: gp3
  
  username: dbadmin
  # Use AWS-managed secrets (recommended for production)
  manage_master_user_password: true
  
  backup_window: "03:00-04:00"
  maintenance_window: "mon:04:00-mon:05:00"
  
  enabled_cloudwatch_logs_exports:
    - postgresql
  
  performance_insights_enabled: true
  
  parameters:
    max_connections: "200"
    shared_buffers: "256MB"

networking:
  vpc_id: vpc-12345678
  subnet_ids:
    - subnet-11111111
    - subnet-22222222
  allowed_security_groups:
    - sg-33333333

security:
  encryption_enabled: true
  public_access: false
  deletion_protection: true
  audit_logging: true

reliability:
  multi_az: true
  backup_retention_days: 7

tags:
  application: myapp
