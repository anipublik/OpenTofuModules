meta:
  environment: production
  region: us-east-1
  name: session-cache
  team: platform
  cost_center: eng-001

cluster:
  engine: redis
  engine_version: "7.0"
  node_type: cache.t3.medium
  num_cache_clusters: 2
  
  snapshot_window: "03:00-05:00"
  maintenance_window: "mon:05:00-mon:07:00"
  
  parameters:
    maxmemory-policy: "allkeys-lru"
    timeout: "300"

networking:
  vpc_id: vpc-12345678
  subnet_ids:
    - subnet-11111111
    - subnet-22222222
  allowed_security_groups:
    - sg-33333333

security:
  encryption_enabled: true
  public_access: false
  deletion_protection: true
  audit_logging: true

reliability:
  multi_az: true
  backup_retention_days: 7

tags:
  application: sessions
