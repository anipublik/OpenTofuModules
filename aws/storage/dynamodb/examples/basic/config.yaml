meta:
  environment: production
  region: us-east-1
  name: users
  team: platform
  cost_center: eng-001

table:
  billing_mode: PAY_PER_REQUEST
  hash_key: user_id
  range_key: timestamp
  
  attributes:
    - name: user_id
      type: S
    - name: timestamp
      type: N
    - name: email
      type: S
  
  global_secondary_indexes:
    - name: email-index
      hash_key: email
      projection_type: ALL
  
  stream_enabled: true
  stream_view_type: NEW_AND_OLD_IMAGES
  
  ttl_enabled: true
  ttl_attribute: expires_at

security:
  encryption_enabled: true
  public_access: false
  deletion_protection: true
  audit_logging: true

reliability:
  point_in_time_recovery: true

tags:
  application: users-service
